        const firebaseConfig = {

            projectId: "english-reading-6b506",
            storageBucket: "english-reading-6b506.firebasestorage.app",

            appId: "1:494747176273:web:585487fadb29b2e5e2d770",

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gept-writing-mock-v1';

        const questionsData = [
            
            // =========================================================

            { 
                id: 'q1', 
                type: '圖表判讀與社會觀察', 
                title: '我們與惡的距離：網路酸民現象', 
                instructions: '請閱讀下方圖表資訊，寫下你對「網路酸民現象」的理解，並結合個人生活經驗，提出你的看法。', 
                prompt: `<img src="images/p1.jpg" alt="題目圖片" class="w-full max-w-md mx-auto rounded-xl shadow-sm mb-5 border border-pink-100">\n【調查數據顯示】：\n在近三年的網路霸凌事件中，有高達 65% 的攻擊者表示「只是覺得好玩或跟風」，20% 表示「為了伸張正義」，僅有 15% 是與被害者有私人恩怨。\n\n請說明你對此數據的解讀，並寫下你的感受與想法。`, 
                sample: `🌟【第一段：起 ─ 引導破題】
💡 寫作思考：開篇運用視覺與聽覺摹寫營造網路世界的冷酷感，並直接切入題目提供的數據，點出「跟風霸凌」的現象，迅速扣題。
🎯 修辭與佳句：暗喻（化身為手持利刃的法官）。
📝 範文段落：
　　螢幕散發著冷冽的藍光，鍵盤敲擊聲如同一陣陣急促的雨，在這個看似自由的虛擬國度裡，人們披上匿名的外衣，化身為手持利刃的法官。根據數據顯示，高達百分之六十五的網路霸凌者，其動機竟是輕描淡寫的「好玩或跟風」。這般輕率的惡意，令人不寒而慄，也讓我深刻反思，我們與惡的距離，原來僅在一指之間。

🌟【第二段：承 ─ 深入剖析】
💡 寫作思考：引用名言加深論述深度，分析「從眾心理」如何稀釋個人道德責任，探討霸凌背後的社會心態。
🎯 修辭與佳句：引用（雪崩的時候，沒有一片雪花是無辜的）、轉化（壓垮受害者的最後一根稻草）。
📝 範文段落：
　　「雪崩的時候，沒有一片雪花是無辜的。」這句話精準地刻畫了跟風霸凌的本質。許多人或許並未直接發起攻擊，但在螢幕後方輕輕按下的一個「讚」、一次「分享」，或是跟著群眾嘲諷的一句玩笑，都成了壓垮受害者的最後一根稻草。在虛擬世界中，個人責任被群體稀釋，從眾心理讓人們輕易地跨越了道德的底線。當「好玩」凌駕於他人的尊嚴與痛苦之上，這不僅是個人的良知迷失，更是整個社會同理心的匱乏。

🌟【第三段：轉 ─ 個人經歷】
💡 寫作思考：將大範圍的社會現象轉回自身生活，舉班級群組霸凌為例，增加文章真實性與說服力。描寫內心掙扎與挺身而出的勇氣。
🎯 修辭與佳句：映襯（在群眾的喧囂中保持清醒，需要極大的勇氣；而冷眼旁觀，其實也是另一種形式的施暴）。
📝 範文段落：
　　我曾親眼目睹班上同學因一件微小的誤會，而在班級群組中遭到鋪天蓋地的嘲諷。起初，只有兩三個人發言，但隨後，越來越多「覺得好玩」的人加入戰局。我看著那名同學日漸黯淡的眼神，心中滿是掙扎。最終，我鼓起勇氣在群組中呼籲大家冷靜，雖然引來了一些冷言冷語，但霸凌的浪潮總算稍稍平息。那次經驗讓我明白，在群眾的喧囂中保持清醒，需要極大的勇氣；而冷眼旁觀，其實也是另一種形式的施暴。

🌟【第四段：合 ─ 總結期許】
💡 寫作思考：總結全文，提出具體作法（心中植入「同理」的尺），並以溫暖的期許作結，首尾呼應，昇華文章主旨。
🎯 修辭與佳句：轉化（植入一把名為同理的尺）、映襯（帶來溫暖的光，而非隨波逐流的暗流）。
📝 範文段落：
　　面對網路酸民現象，我們不能僅僅譴責，更需從自身做起。在敲下鍵盤前，我們應當在心中植入一把名為「同理」的尺，多思考三秒鐘：這段文字是否會成為刺向他人的利刃？真正的正義，從來不是建立在言語的暴力之上；真正的幽默，也不該以他人的痛苦為代價。期許我們都能成為網路世界中帶來溫暖的光，而非隨波逐流的暗流。` 
            },

            // =========================================================
            // 📝 題號：2
            // =========================================================
            { 
                id: 'q2', 
                type: '情境想像與生命體悟', 
                title: '門', 
                instructions: '「門」可以是有形的阻隔，也可以是無形的心防；打開門可能是迎接新世界，關上門可能是尋求庇護。請以「門」為題，寫下你的經驗、感受或想法。', 
                prompt: `<img src="images/p2.jpg" alt="題目圖片" class="w-full max-w-md mx-auto rounded-xl shadow-sm mb-5 border border-pink-100">\n每個人生命中都會面對無數扇門。有些門充滿未知，有些門給人安全感。請結合具體經驗，寫出你面對某一扇「門」時的故事。`, 
                sample: `🌟【第一段：起 ─ 破題與定義】
💡 寫作思考：以空間的門引申到心靈的門，確立全文「門是心靈防線與自我對話」的核心立意。
🎯 修辭與佳句：譬喻（門不僅是空間的區隔，更是心靈的防線）。
📝 範文段落：
　　在人生的長廊裡，矗立著無數扇門。有的門扉半掩，透著溫暖的微光，引人駐足；有的則深鎖緊閉，散發著令人卻步的幽暗。而對我而言，「門」不僅是空間的區隔，更是心靈的防線，每一次的開與關，都是一次與自我對話的歷程。

🌟【第二段：承 ─ 敘述舊經驗（關門）】
💡 寫作思考：回憶童年缺乏安全感的經歷，具體描寫「關門」逃避外界的行為，點出關門雖能保護自己，卻也帶來孤立。
🎯 修辭與佳句：暗喻（獨自舔舐傷口的小小堡壘、躲避外界風雨的盾牌）。
📝 範文段落：
　　童年時期的我，是個極度缺乏安全感的孩子。那時，我的房間有一扇厚重的木門，只要一遇見挫折或委屈，我便會逃回房間，將那扇門緊緊鎖上。門外，是父母無奈的嘆息和社會的喧囂；門內，則是我獨自舔舐傷口的小小堡壘。那扇門，是我躲避外界風雨的盾牌，卻也悄悄地，將我與世界隔離，讓我困在自怨自艾的泥淖中無法自拔。

🌟【第三段：轉 ─ 轉折點（開門）】
💡 寫作思考：以國二話劇公演為轉折，描寫面對挑戰的恐懼，以及受到鼓勵後「推開門」的內心掙扎與勇氣。
🎯 修辭與佳句：轉化（心中的某個角落似乎被觸動了）。
📝 範文段落：
　　直到國二那年，班上舉辦了一場話劇公演。平時總是安靜坐在角落的我，意外地被老師指派擔任要角。面對這突如其來的挑戰，我的第一反應是恐懼，我想再次退回那扇緊閉的木門後。然而，看著同學們熱烈討論的神情，以及老師眼中殷切的期盼，我心中的某個角落似乎被觸動了。我深吸一口氣，顫抖著手，緩緩推開了那扇長久以來封閉的心門。

🌟【第四段：合 ─ 開門後的收穫與期許】
💡 寫作思考：對比推開門前的美好想像與實際收穫，總結勇敢開門才能迎向陽光，期許自己積極探索未來。
🎯 修辭與佳句：譬喻（以勇敢為鑰匙）、映襯（門的背後或許有荊棘，但也必然綻放著玫瑰）。
📝 範文段落：
　　推開門的剎那，迎面而來的並非我想像中的狂風暴雨，而是溫暖和煦的陽光。我終於明白，關上門固然能獲得一時的寧靜，卻也錯失了門外無限的風景與可能。如今，我不再畏懼生命中的每一扇門。我知道，門的背後或許有荊棘，但也必然綻放著玫瑰。我願以勇敢為鑰匙，推開一扇扇未知的大門，去探索、去體驗，去擁抱那無限寬廣的未來。` 
            },

            // =========================================================
            // 📝 題號：3
            // =========================================================
            { 
                id: 'q3', 
                type: '對話思辨與價值觀', 
                title: '關於「成功」的定義', 
                instructions: '請閱讀以下兩人的對話，並就你的經驗與觀察，寫下你對「成功」的看法。', 
                prompt: `<img src="images/p3.jpg" alt="題目圖片" class="w-full max-w-md mx-auto rounded-xl shadow-sm mb-5 border border-pink-100">\n甲：「成功就是考上頂尖大學，找到高薪工作，成為社會的菁英。」\n乙：「不對，成功是能從事自己熱愛的事物，就算平凡，也能每天感到快樂與踏實。」\n\n你比較認同誰的觀點？或者你有其他的看法？`, 
                sample: `🌟【第一段：起 ─ 破題與詰問】
💡 寫作思考：以設問法開頭，提出成功沒有單一標準，而是一場追尋自我價值的旅程，確立文章的思辨基調。
🎯 修辭與佳句：錯綜、設問（有人以功名利祿為尺...有人以心靈豐盈為秤）。
📝 範文段落：
　　何謂成功？這是一個千古以來叩問人心的難題。有人以功名利祿為尺，丈量成功的刻度；有人以心靈豐盈為秤，衡量生命的重量。對於甲與乙的爭論，我認為成功並非單一的標準答案，而是一場不斷追尋自我價值的旅程。

🌟【第二段：承 ─ 分析世俗的成功（甲觀點）】
💡 寫作思考：分析甲的觀點，承認世俗成就的誘人，但隨即反問其可能帶來的空虛，展現批判性思考。
🎯 修辭與佳句：借代（叱吒風雲）、暗喻（追逐名利的機器）。
📝 範文段落：
　　甲的觀點，反映了社會主流的價值觀。考上頂尖學府、躋身菁英之列，確實能帶來物質的豐厚與他人的稱羨。然而，若僅以世俗的成就作為唯一的追求，生命是否會淪為一架追逐名利的機器？我曾見過許多長輩，他們在職場上叱吒風雲，卻在夜深人靜時感到無比空虛。當成功只剩下冰冷的數字與頭銜，心靈的枯竭便會隨之而來。

🌟【第三段：轉 ─ 肯定心靈的成功（乙觀點）】
💡 寫作思考：轉而支持乙的看法，並舉出周遭平凡小人物（木匠叔叔）為例，說明踏實與快樂才是無法取代的財富。
🎯 修辭與佳句：轉化（雕琢每一件作品、活出了最不平凡的姿態）。
📝 範文段落：
　　相較之下，我更傾向乙的看法。真正的成功，應當源於對生命純粹的熱愛。我的叔叔是一位平凡的木匠，他沒有顯赫的學歷，也沒有傲人的財富，但他每天都沉浸在木屑的香氣中，用心雕琢每一件作品。我看著他粗糙的雙手撫過木紋時那滿足的笑容，我明白，那就是成功。他或許平凡，卻在自己熱愛的領域中，活出了最不平凡的姿態。踏實與快樂，是任何金錢都無法換取的心靈財富。

🌟【第四段：合 ─ 統整並提出獨特見解】
💡 寫作思考：將甲乙觀點融合，提出成功的最高境界是「在兩者間取得平衡」，並以精湛的名言作結，提升文章格局。
🎯 修辭與佳句：名言改寫（成功不是一把量尺，而是一面鏡子）。
📝 範文段落：

                sample: `🌟【第一段：起 ─ 感官摹寫破題】
💡 寫作思考：運用視覺、聽覺、嗅覺等多重感官摹寫，生動勾勒傳統市場充滿煙火氣的氛圍，迅速帶讀者進入情境。

📝 範文段落：
　　清晨的微光尚未完全穿透雲層，城市的某個角落便已甦醒。那是傳統市場，一個揉合了泥土腥味、魚腥味與熟食香氣的地方，一個交織著吆喝聲、討價還價聲與摩托車引擎聲的生命聚落。在這裡，我總喜歡駐足於一個不起眼的角落，看著那裡上演的一幕幕人間煙火。

🌟【第二段：承 ─ 特寫人物與場景】
💡 寫作思考：將鏡頭拉近，特寫角落裡的賣菜老奶奶。透過細膩的動作與外貌描寫，呈現她堅韌卻平靜的生命姿態。
🎯 修辭與佳句：譬喻（背脊佝僂得彷彿承載了歲月所有的重量）、視覺摹寫（青翠欲滴）。
📝 範文段落：
　　那是一個賣菜的小攤位，蜷縮在市場邊緣的遮雨棚下。攤主是一位年過古稀的老奶奶，她的背脊佝僂得彷彿承載了歲月所有的重量，臉上布滿了如樹皮般深深淺淺的溝壑。攤位上的蔬菜不多，卻被她打理得整整齊齊、青翠欲滴。她不似其他攤販那般聲嘶力竭地叫賣，只是安靜地坐在小板凳上，用一雙長滿厚繭的手，仔細地揀去菜葉上的黃斑。

🌟【第三段：轉 ─ 互動與情感流露】
💡 寫作思考：描寫老奶奶對待顧客的態度，點出傳統市場最珍貴的「人情味」，這是超市所缺乏的溫度。
🎯 修辭與佳句：轉化（撫平早晨的匆忙與浮躁）。
📝 範文段落：
　　令我印象最深刻的，是她對待顧客的態度。每當有人駐足，她總會抬起頭，漾起一抹慈祥的微笑，眼底閃爍著溫和的光芒。她不會斤斤計較那幾塊錢的零頭，有時甚至會多塞兩根蔥到客人的袋子裡。「多吃點青菜，身體才會好喔！」她那略帶沙啞卻充滿溫暖的嗓音，總能輕易地撫平早晨的匆忙與浮躁。在那個小小的角落裡，買賣不再只是金錢的交易，更是一種人情味的傳遞。

🌟【第四段：合 ─ 昇華與總結】
💡 寫作思考：將菜攤的簡陋與超市的冰冷進行對比，總結這個角落所蘊藏的真實生活與溫柔，首尾呼應。
🎯 修辭與佳句：映襯（超市裡的精美包裝...少了與泥土連結的溫度）。
📝 範文段落：
　　在這個講求效率與冰冷數據的時代，超市裡的蔬菜被精美包裝，標價清晰，卻少了那份與泥土連結的溫度。而老奶奶的菜攤，雖然簡陋，卻散發著強韌的生命力與淳樸的善意。菜市場裡的角落，藏著最真實的生活百態。老奶奶的身影，宛如一幅歷經風霜卻依然溫暖的畫作，深深地烙印在我的腦海裡，提醒著我在喧囂的世界中，莫忘那份最質樸的人情與溫度。`

            { 
                id: 'q5', 
                type: '個人反思與成長', 
                title: '那一次，我選擇了放棄', 
                instructions: '放棄不一定代表失敗，有時是為了更好的前進或保護自己。請以「那一次，我選擇了放棄」為題，寫下你的經驗與體悟。', 
                prompt: `<img src="images/p5.jpg" alt="題目圖片" class="w-full max-w-md mx-auto rounded-xl shadow-sm mb-5 border border-pink-100">\n我們總是被教導「永不放棄」，但在你的生命經驗中，是否曾有過「選擇放棄」的時刻？這個決定帶給你什麼影響？`, 
                sample: `🌟【第一段：起 ─ 打破既定認知】
💡 寫作思考：開篇直接挑戰「永不放棄」的傳統觀念，提出「放棄有時比堅持更需要智慧」的新穎論點，吸引評審目光。
🎯 修辭與佳句：轉化（被師長反覆鐫刻在心中）。
📝 範文段落：
　　「堅持到底，永不放棄」是自幼便被師長反覆鐫刻在心中的座右銘。在我的認知裡，放棄是弱者的代名詞，是面對挑戰時的懦弱退縮。然而，生命中總有一些時刻，教導我們：有時，勇敢地選擇放棄，比盲目的堅持更需要智慧與勇氣。

🌟【第二段：承 ─ 敘述堅持的痛苦】
💡 寫作思考：具體描述自己在田徑隊選拔中遭遇的瓶頸與身體傷痛，營造出進退維谷的真實困境。
🎯 修辭與佳句：擬人（身體的哀鳴）、誇飾（每踏出一步，腳跟傳來的刺痛都在警告我）。
📝 範文段落：
　　那是我國一時的田徑隊選拔。一直夢想能在田徑場上馳騁的我，每天清晨天未亮便在操場上揮灑汗水。起初，我的成績突飛猛進，但漸漸地，我發現自己遭遇了瓶頸。無論我如何加倍訓練，秒數始終停滯不前，甚至因為過度訓練而導致阿基里斯腱發炎。每踏出一步，腳跟傳來的刺痛都在警告我：我的身體已經達到了極限。面對即將到來的最終選拔，我陷入了天人交戰。

🌟【第三段：轉 ─ 轉念與選擇放下】
💡 寫作思考：透過教練的一席話（醍醐灌頂），描寫心境的轉折，理解盲目堅持的傷害，並選擇放下。
🎯 修辭與佳句：譬喻（如醍醐灌頂）、名言改寫（懂得在適當的時候轉彎，才是真正的成熟）。
📝 範文段落：
　　一邊是長久以來的夢想與不甘心，另一邊是醫生嚴厲的警告與身體的哀鳴。我曾在夜裡獨自落淚，痛恨自己的無能為力。但在一次深談中，教練告訴我：「放棄這條跑道，不代表你失去了整片天空。懂得在適當的時候轉彎，才是真正的成熟。」這番話如醍醐灌頂，讓我恍然大悟：盲目的堅持只會帶來更大的傷害，而學會放下，才能騰出雙手擁抱其他可能。

🌟【第四段：合 ─ 放棄帶來的意外收穫】
💡 寫作思考：總結放棄後投入寫作的意外收穫，昇華「放棄是另一種轉向」的主題，圓滿作結。
🎯 修辭與佳句：映襯（不是失敗的終點，而是美好起點的開端）。
📝 範文段落：
　　最終，我選擇了退出選拔，接受了治療。那段休養的日子裡，我將原本用於訓練的時間投入到寫作中。令人驚訝的是，我在文字的世界裡找到了另一片廣闊的天地，我的文章甚至在校刊上獲得了刊登。放棄，不是舉手投降，而是一種沉澱後的生命轉向。它讓我們學會誠實面對自己的局限。那一次，我選擇了放棄，卻贏得了更寬廣、更適合自己的人生風景。` 
            },

                prompt: `<img src="images/p6.jpg" alt="題目圖片" class="w-full max-w-md mx-auto rounded-xl shadow-sm mb-5 border border-pink-100">\n【常見標題】：\n◆ 專家證實！每天吃這個，考試絕對拿高分！\n◆ 男孩做了一個動作，全場都驚呆了！\n\n為什麼這類標題會大受歡迎？你曾受騙過嗎？身為現代閱聽人該具備什麼態度？`, 
                sample: `🌟【第一段：起 ─ 現象點題】
💡 寫作思考：以常見的聳動標題開場，並用「披著糖衣的誘餌」為喻，點出標題殺欺騙讀者的本質。
🎯 修辭與佳句：譬喻（猶如披著華麗糖衣的誘餌）、視覺摹寫（資訊如洪流般席捲）。
📝 範文段落：
　　「震驚！不看絕對後悔！」、「全網瘋傳，真相竟然是這樣……」在資訊如洪流般席捲的網路時代，我們每天的手指滑動間，總會被這類誇張、聳動的「標題殺」所包圍。這些標題猶如披著華麗糖衣的誘餌，精準地捕捉了人們的好奇心與偷窺慾，卻往往在點擊之後，留下一陣被欺騙的空虛與無奈。

🌟【第二段：承 ─ 探究根源】
💡 寫作思考：展現國中生少有的思辨深度，指出「注意力經濟」與「流量變現」才是媒體道德淪喪的罪魁禍首。
🎯 修辭與佳句：轉化（換來點擊率的變現、對大眾智商的低估）。
📝 範文段落：
　　「標題殺」之所以氾濫，其根源在於注意力經濟的崛起。在這個「流量即金錢」的時代，媒體為了在浩瀚的資訊海中脫穎而出，不惜捨棄了客觀中立的報導原則，轉而以激起閱聽人強烈情緒（如恐懼、憤怒、獵奇）為手段。他們深知，平鋪直敘的事實往往乏人問津，唯有加上「太神了」、「崩潰」等強烈字眼，才能換來點擊率的變現。這種現象，不僅是媒體道德的淪喪，更是對大眾智商的低估。

🌟【第三段：轉 ─ 結合親身受害經驗】
💡 寫作思考：以大考前夕被「學霸記憶法」騙點擊的經驗，加強論述的說服力與自身的憤怒感。
🎯 修辭與佳句：成語運用（老調重彈、毫無新意）。
📝 範文段落：
　　我曾是這種亂象的受害者。某次大考前夕，我被一則「哈佛學霸都在用的記憶法，保證成績翻倍」的標題吸引。我滿懷希望地點擊進入，卻發現內容只是老調重彈的「早睡早起、專心聽講」，毫無新意可言。那一刻，我深感憤怒，不僅是因為浪費了寶貴的時間，更是因為自己的焦慮被有心人士當作了賺取流量的工具。

🌟【第四段：合 ─ 提出解方與期許】
💡 寫作思考：呼籲閱聽人培養獨立思考能力，戒除反射性點擊，總結出「理智是抵禦陷阱最佳武器」的結論。
🎯 修辭與佳句：暗喻（找到真正有價值的知識綠洲）。
📝 範文段落：
　　面對層出不窮的「標題殺」，身為現代閱聽人，我們必須培養獨立思考的免疫力。首先，應當戒除「反射性點擊」的習慣，在被標題撩撥情緒時，先停下來思考三秒鐘。其次，應學會交叉比對資訊來源。在資訊喧囂的時代，保持一顆澄明、理智的心，是我們抵禦標題陷阱的最佳武器。唯有拒絕成為流量的盲目跟隨者，我們才能在網路世界中，找到真正有價值的知識綠洲。`

📝 範文段落：
　　若這本筆記本屬於我，我不會用它來記錄枯燥的數學公式，也不會用它來羅列繁瑣的待辦事項。我願將它化作一座專屬的「時光博物館」，用以收藏生命中那些微小卻閃耀著微光的美好瞬間。或許是某個清晨，陽光穿透樹葉灑在窗台上的斑駁光影；或許是放學回家的路上，一陣帶著梔子花香的微風；又或許是朋友在失落時遞來的一顆糖果、一個溫暖的擁抱。

　　此外，這本空白的筆記本也是我與自我對話的秘密花園。在夜深人靜時，我可以在此傾訴那些不為人知的徬徨與脆弱，將內心的雜念化作一行行清晰的字跡。它是一個永遠包容、不會評判的傾聽者，讓我在書寫的過程中，逐漸理清思緒，找回內心的平靜與力量。

　　在步調極快的現代生活中，我們總是不斷地向前奔跑，卻往往忽略了沿途的風景。記錄這些片刻，是提醒我放慢腳步去細細品味生活。一本空白的筆記本，承載著我對生活的熱愛與對自我的探索。每一筆、每一劃，都是生命走過的痕跡。當它最終被填滿時，那將是我青春歲月裡，最獨一無二、最珍貴的篇章。`

                title: '青銀共居的挑戰與契機',

                prompt: `<img src="images/p8.jpg" alt="題目圖片" class="w-full max-w-md mx-auto rounded-xl shadow-sm mb-5 border border-pink-100">\n政府推動「青銀共居」，讓沒有血緣關係的年輕人與老人同住。你認為這會產生什麼衝突？又會帶來什麼意想不到的火花？`, 
                sample: `🌟【第一段：起 ─ 點出社會背景】
💡 寫作思考：以台灣高齡化的社會背景破題，定義「青銀共居」是一場跨世代心靈的碰撞與對話。
🎯 修辭與佳句：轉化（跨越血緣的藩籬、跨世代心靈的碰撞）。
📝 範文段落：
　　在人口結構急遽高齡化的臺灣，「青銀共居」作為一種新興的居住模式，正逐漸走入大眾的視野。讓充滿活力的青年與歷經滄桑的長者，跨越血緣的藩籬，在同一個屋簷下共享生活，這不僅是一場解決居住與安養問題的社會實驗，更是一次跨世代心靈的碰撞與對話。

🌟【第二段：承 ─ 客觀分析衝突與挑戰】
💡 寫作思考：客觀分析青銀兩代生活習慣的差異，利用對比手法（鍵盤聲 vs 收音機），點出共居的潛在危機。
🎯 修辭與佳句：映襯（半夜敲擊鍵盤的清脆聲 遇上 清晨播放的收音機廣播）。
📝 範文段落：
　　不可諱言，青銀共居首當其衝的挑戰，便是價值觀與生活習慣的巨大差異。年輕人習慣於快節奏、網路化且重視個人隱私的生活；而長者則往往保有早睡早起、節儉且渴望陪伴的傳統步調。當「半夜敲擊鍵盤的清脆聲」遇上「清晨播放的收音機廣播」，生活中的微小摩擦極易演變為代溝的鴻溝。若缺乏足夠的包容與溝通，原本立意良善的共居，恐將淪為彼此的負擔。

🌟【第三段：轉 ─ 發掘優勢與契機】
💡 寫作思考：筆鋒一轉，探討雙方能互補的優勢（青年教科技、長者傳授生命智慧），展現多元思考的深度。
🎯 修辭與佳句：譬喻（如春風化雨般，撫平青年內心的躁動）。
📝 範文段落：
　　然而，正是這些差異，孕育了青銀共居最珍貴的契機。青年能為長者的生活注入鮮活的泉源，教導長者使用智慧型手機與遠方親友視訊，讓科技跨越孤獨的圍牆；反之，長者身上沉澱的生命智慧，亦是青年無價的寶藏。在面對升學或職場的焦慮時，長者一句歷經千帆後的豁達話語，往往能如春風化雨般，撫平青年內心的躁動。

🌟【第四段：合 ─ 總結論點與期許】
💡 寫作思考：總結共居的成功關鍵在於「同理心」，並期許此制度能為冷漠社會點亮溫情之燈。
🎯 修辭與佳句：排比（用傾聽代替指責，用包容化解衝突）。
📝 範文段落：
　　「青銀共居」絕非簡單的物理空間共享，而是一場需要以「同理心」為橋樑的跨世代交融。只要我們願意放下成見，用傾聽代替指責，用包容化解衝突，青銀共居必能激盪出最溫暖的火花，為這日漸冷漠的社會，點亮一盞盞跨越世代的溫情之燈。` 
            },

            { 
                id: 'q9', 
                type: '個人經歷與成長', 
                title: '從陌生到熟悉', 
                instructions: '請以「從陌生到熟悉」為題，寫下你在學習新事物或適應新環境過程中的經驗。', 
                prompt: `<img src="images/p9.jpg" alt="題目圖片" class="w-full max-w-md mx-auto rounded-xl shadow-sm mb-5 border border-pink-100">\n也許是一項新技能，也許是一個新班級。這個從抗拒、摸索到駕輕就熟的過程，帶給你什麼樣的成長？`, 
                sample: `🌟【第一段：起 ─ 航海譬喻破題】
💡 寫作思考：以乘舟航海為喻，將學習新事物必經的陣痛期具象化，點出「跨越陌生才能迎來蛻變」的核心旨意。
🎯 修辭與佳句：譬喻（生命宛如一條川流不息的長河，我們乘著小舟...）。
📝 範文段落：
　　生命宛如一條川流不息的長河，我們乘著小舟，不斷地駛離熟悉的港灣，航向未知的海域。每一次的啟航，都伴隨著對「陌生」的恐懼與抗拒；而每一次的靠岸，又見證了從陌生到「熟悉」的成長蛻變。對我而言，學習吉他的歷程，便是一場從指尖的刺痛到心靈共鳴的奇妙旅途。

🌟【第二段：承 ─ 描寫陌生的挫折】
💡 寫作思考：將初學的樂器擬人化為「脾氣古怪的陌生人」，生動描繪初學時手指的刺痛與內心的挫折想放棄。
🎯 修辭與佳句：擬人（脾氣古怪的陌生人）、視覺摹寫（深深的紅印）。
📝 範文段落：
　　初次懷抱著那把木吉他時，它對我來說，就像一個脾氣古怪的陌生人。六根堅硬的鋼弦，毫不留情地在我的指腹上勒出一道道深深的紅印；左手僵硬地按著和弦，右手笨拙地撥弄，發出的卻是如破銅爛鐵般刺耳的噪音。那段日子，挫折感如影隨形，我常常望著紅腫破皮的手指，心中萌生了放棄的念頭。這個陌生的樂器，似乎永遠無法與我產生連結。

🌟【第三段：轉 ─ 跨越障礙的轉折】
💡 寫作思考：描寫不甘妥協的決心，以及長出厚繭後，從生疏到熟悉的漸進過程，展現毅力。
🎯 修辭與佳句：轉化（無形的冰牆開始出現了裂縫）。
📝 範文段落：
　　然而，看著指導老師在弦上輕盈飛舞的手指，我不甘心就此妥協。我開始強迫自己每天面對這個「陌生人」。指尖破皮了，便貼上透氣膠布繼續按壓；長出厚厚的繭後，疼痛逐漸被一種奇妙的踏實感所取代。我反覆練習著和弦的轉換，從最初的磕磕絆絆，到後來能勉強連貫。在一次次的磨合中，我與吉他之間那道無形的冰牆，開始出現了裂縫。真正讓我感受到「熟悉」的，是那個微風徐徐的午後，琴弦不再是冰冷堅硬的金屬，而是成了我情感的延伸。

🌟【第四段：合 ─ 總結成長體悟】
💡 寫作思考：總結這段歷程帶來的成長，點出勇敢擁抱陌生，才能收穫熟悉後的斑斕色彩。
🎯 修辭與佳句：暗喻（毅力為舟，勇氣為槳）。
📝 範文段落：
　　從陌生到熟悉，是一段跨越舒適圈的陣痛期，需要毅力為舟，勇氣為槳。這段歷程教會了我，不要因為眼前的困難而卻步，因為唯有勇敢地擁抱陌生，熬過破繭的痛楚，我們才能收穫熟悉後的甘甜，讓生命的光譜增添更多斑斕的色彩。` 
            },

            { 
                id: 'q10',

                title: '我們這個「快」世代', 
                instructions: '現代人追求速度：速食、快時尚、短影音。請以「我們這個『快』世代」為題，寫下你的觀察與反思。', 
                prompt: `<img src="images/p10.jpg" alt="題目圖片" class="w-full max-w-md mx-auto rounded-xl shadow-sm mb-5 border border-pink-100">\n「快」為我們帶來了便利，但我們是否也因此失去了什麼？請具體說明你的看法。`, 
                sample: `🌟【第一段：起 ─ 快世代的速寫】
💡 寫作思考：運用排比手法快速勾勒出「速食、快時尚、短影音」的生活切片，並用失控的高鐵比喻這個世代。
🎯 修辭與佳句：排比（大口吞嚥著...身上穿著...手指滑過...）、暗喻（沒有煞車的高鐵）。
📝 範文段落：
　　這是一個被按下快轉鍵的時代。我們大口吞嚥著五分鐘出爐的速食，身上穿著一季便淘汰的快時尚服飾，手指在螢幕上不耐煩地滑過只有十五秒的短影音。在「效率」與「速度」的狂熱追逐中，我們這個「快」世代，彷彿搭上了一輛沒有煞車的高鐵，在享受沿途疾馳的快感時，卻也逐漸遺失了靈魂的厚度。

🌟【第二段：承 ─ 反思知識的碎片化】
💡 寫作思考：先肯定「快」帶來的便利，隨即指出其代價：失去閱讀長文的耐心，導致思考扁平化。
🎯 修辭與佳句：轉化（腐蝕了我們深刻感知生活的能力）。
📝 範文段落：
　　「快」確實帶來了前所未有的便利，彈指之間便能獲取地球另一端的資訊。然而，這種對速度的盲目崇拜，卻悄悄地腐蝕了我們深刻感知生活的能力。以閱讀為例，過去的人們願意花上幾個午後，沉浸在一本厚重的小說中；如今，我們卻習慣於閱讀「懶人包重點整理」。這種碎片化、淺層化的資訊吸收，無法在腦海中沉澱為智慧。長此以往，我們的思考能力變得扁平，看似知道了一切，實則對一切都一知半解。

🌟【第三段：轉 ─ 探討人際的速食化】
💡 寫作思考：將反思延伸至人際關係，指出通訊軟體的便利反而剝奪了等待的情感醞釀，讓關係變得廉價易碎。
🎯 修辭與佳句：映襯（習慣了「已讀不回」的焦慮，卻忘記了...期盼手寫信件時的繾綣）。
📝 範文段落：
　　此外，「快世代」也讓人際關係變得速食化。通訊軟體的發達，讓我們能隨時傳送訊息，但那冷冰冰的文字與貼圖，卻往往掩蓋了真實的語氣與溫度。我們習慣了「已讀不回」的焦慮，卻忘記了過去那種期盼一封手寫信件時，心中那份繾綣的浪漫與深情。快速的交友與分離，讓情感變得廉價而易碎。

🌟【第四段：合 ─ 呼籲學習「慢」的藝術】
💡 寫作思考：引用古人智慧，呼籲在喧囂的快世代中刻意練習「慢下來」，找回生活質感與靈魂厚度。
🎯 修辭與佳句：引用（欲速則不達）、排比（慢下來，去...）。
📝 範文段落：
　　「欲速則不達」，古人的智慧在今日依然震聾發聵。在這個越發喧囂急躁的「快」世代，我們更需要學習「慢」的藝術。慢下來，去細細品味一杯咖啡的香醇；慢下來，去專注聆聽微風拂過樹葉的沙沙聲；慢下來，去好好愛一個人。唯有在慢的從容中，我們才能找回生活的質感，讓靈魂得以在時間的長河中，深深地扎根。` 
            },

            {

                prompt: `<img src="images/p11.jpg" alt="題目圖片" class="w-full max-w-md mx-auto rounded-xl shadow-sm mb-5 border border-pink-100">\n請寫下一次你感到「捨不得」的真實經驗。是什麼讓你猶豫掙扎？最後你學到了什麼？`, 
                sample: `🌟【第一段：起 ─ 解構「捨不得」的情感】
💡 寫作思考：細膩地解構「捨不得」三字帶來的酸澀與眷戀，並自然引出即將向童年老鋼琴告別的核心事件。
🎯 修辭與佳句：轉化（輕輕地勾惹著心底最柔軟的角落）。

　　「捨不得」，這三個字總帶著一絲酸澀與眷戀，輕輕地勾惹著心底最柔軟的角落。在生命的長河中，我們不斷地拾起，也不斷地被迫放下。有時是捨不得一件承載回憶的舊物，有時是捨不得一段漸行漸遠的關係。而最令我刻骨銘心的一次「捨不得」，是向陪伴我童年的老舊鋼琴告別。

🌟【第二段：承 ─ 傾訴舊物乘載的回憶】
💡 寫作思考：細緻描寫老鋼琴的外觀特徵，以及它與外婆共同見證的溫暖童年，強化後文割捨時的痛苦。
🎯 修辭與佳句：視覺摹寫（外觀斑駁的胡桃木色）、轉化（吸附了我的汗水與淚水）。
📝 範文段落：
　　那是一架外觀斑駁的胡桃木色鋼琴，琴鍵有些泛黃，甚至有幾個音已經略微走調。它是外婆送給我的五歲生日禮物，也是我音樂啟蒙的搖籃。無數個陽光灑落的午後，我坐在琴凳上，笨拙地敲擊著琴鍵，外婆則在一旁笑著打拍子。那架鋼琴，見證了外婆對我深沉的愛。然而，隨著我考上音樂班，需要更專業的演奏琴，這架老鋼琴面臨了被轉送的命運。

🌟【第三段：轉 ─ 離別的掙扎與外婆的開導】
💡 寫作思考：描寫搬琴工人套上繩索時的內心掙扎，並藉由外婆的智慧話語，帶來心境上的轉折與釋懷。
🎯 修辭與佳句：譬喻（外婆的話語如一陣春風）、佳句（學會放手，才能騰出雙手去擁抱新的未來）。
📝 範文段落：
　　當搬琴工人將粗壯的繩索套在它身上時，我的心彷彿也被緊緊勒住，眼淚不受控制地潰堤。我捨不得的，不僅僅是一件樂器，更是那段無憂無慮的童年時光。在猶豫與掙扎中，外婆輕輕握住我的手說：「琴雖然送走了，但它帶給妳的音樂底子和快樂，已經永遠留在妳心裡了。學會放手，才能騰出雙手去擁抱新的未來。」外婆的話如一陣春風，吹散了我心頭的陰霾。

🌟【第四段：合 ─ 體悟「捨與得」的真諦】
💡 寫作思考：昇華主題，點出捨去實體，將回憶內化為前行的力量，從遺憾轉為滿懷感恩。
🎯 修辭與佳句：映襯（不再帶有遺憾，而是滿懷著溫柔的感恩）。
📝 範文段落：
　　那一次的捨不得，讓我上了一堂深刻的生命教育課。我明白了，「捨」與「得」是一體兩面。唯有勇敢地捨去舊有的依戀，我們才能在人生的旅途上輕裝上陣，迎來更廣闊的天地。如今，每當我坐在新鋼琴前彈奏出流暢的樂章時，我依然會想起那架老鋼琴，只是不再帶有遺憾，而是滿懷著溫柔的感恩。` 
            },

📝 範文段落：
　　倘若有一座「未成功的物品展覽會」，在琳瑯滿目的展台上，有人展出落選的畫作，有人展出烤焦的餅乾。而我，會選擇將書桌抽屜最深處，那一疊厚厚的、寫滿密密麻麻數學算式的計算紙，鄭重地安放在聚光燈下。它看似雜亂無章的廢紙，卻是我國二那年，為了數學競賽拚搏過的最真實見證。

🌟【第二段：承 ─ 描摹外觀與奮鬥過程】
💡 寫作思考：細緻描寫計算紙上汗水洇濕的痕跡、筆尖戳出的破洞，具象化當時挑燈夜戰的艱辛與掙扎。
🎯 修辭與佳句：譬喻（錯綜複雜的線條猶如一團解不開的亂麻）、排比（每一張紙，都承載著...）。
📝 範文段落：
　　這疊計算紙的外觀毫不討喜。有些紙張的邊緣被汗水洇濕而泛黃捲曲；有些角落布滿了焦慮時用筆尖用力戳出的破洞；更常見的，是一道道被用力劃掉的錯誤算式，錯綜複雜的線條猶如一團解不開的亂麻，訴說著當時思緒的死胡同。每一張紙，都承載著無數個挑燈夜戰的孤寂夜晚，以及無數次在放棄與堅持邊緣徘徊的掙扎。

🌟【第三段：轉 ─ 失敗的打擊與心態轉折】
💡 寫作思考：敘述落榜時的崩潰，將心血結晶淪為廢紙的憤怒，隨後經時間推移轉化為釋然，理解過程的價值。
🎯 修辭與佳句：轉化（現實總是骨感的）、映襯（心中的不甘已悄然轉化為釋然）。
📝 範文段落：
　　那年，為了證明自己，我毅然報名了難度極高的全縣數學競賽。然而，現實總是骨感的，比賽結果出爐，我甚至沒有進入複賽。那一刻，這疊曾被我視為「心血結晶」的計算紙，瞬間淪為了無情嘲諷我失敗的「廢紙」。我曾憤怒地想將它們撕毀，卻終究不忍下手。隨著時間推移，當我再次凝視這疊「未成功」的展品時，心中的不甘已悄然轉化為釋然。它讓我明白，成功並非人生的唯一標準，那段為了目標傾盡全力的過程，才是生命中最閃耀的勳章。

🌟【第四段：合 ─ 賦予未成功深刻意義】
💡 寫作思考：點明未成功物品展覽會的核心意義：並非為了紀念失敗，而是銘記青春的熱烈，為未來鋪路。
🎯 修辭與佳句：佳句（所有未成功的曾經，都是鋪就未來坦途的基石）。
📝 範文段落：
　　這疊計算紙，雖然未能為我換來一張金光閃閃的獎狀，卻為我贏得了更珍貴的禮物：面對挫折的勇氣與自我突破的毅力。將它放入「未成功的物品展覽會」，並非為了紀念失敗，而是為了銘記那段曾熱烈燃燒過、奮力拚搏過的青春歲月。因為，所有未成功的曾經，都是鋪就未來坦途的基石。` 
            },

                sample: `🌟【第一段：起 ─ 破除絕對公式】
💡 寫作思考：點出「多做多得」這句古老諺語在真實社會中並非絕對，它其實是一把雙面刃，考驗人的智慧。
🎯 修辭與佳句：譬喻（並非永遠劃上等號的絕對方程式，它更像是一把雙面刃）。
📝 範文段落：
　　「能者多勞，多做多得」，這句古老的諺語，宛如社會的一套潛規則，不斷地敦促著我們在各個領域中積極表現。然而，在經歷了真實的人際互動與團隊合作後，我逐漸體悟到：「多做」與「多得」之間，並非永遠劃上等號的絕對方程式，它更像是一把雙面刃，考驗著我們的智慧與分寸。

🌟【第二段：承 ─ 肯定多做的正面價值】
💡 寫作思考：認同同學甲的觀點，舉自告奮勇採購物資的經驗，證明多做確實能累積實務能力。
🎯 修辭與佳句：成語運用（疲憊不堪、自告奮勇）。
📝 範文段落：
　　不可否認，同學甲的觀點有其價值。在學習的初期，主動承擔額外的任務，確實是累積經驗、拓寬視野的捷徑。記得國二時，班上籌辦園遊會，我自告奮勇攬下了最繁瑣的物資採購與帳目核對。那段日子雖然疲憊不堪，但我卻因此學會了成本控管與與廠商交涉的溝通技巧。這種「多做」，讓我獲得了書本上學不到的實務能力，這無疑是一種珍貴的「多得」。

🌟【第三段：轉 ─ 揭示毫無底線多做的代價】
💡 寫作思考：引出同學乙的擔憂，舉小組報告包攬工作反被推卸責任為例，反思失去界線的付出只會寵壞他人。
🎯 修辭與佳句：轉化（當「多做」跨越了某條隱形的界線，同學乙的擔憂便會真實上演）。
📝 範文段落：
　　然而，當「多做」跨越了某條隱形的界線，同學乙的擔憂便會真實上演。在一次小組報告中，我為了追求完美，不僅包辦了資料搜集與簡報製作，甚至連同組員的上台講稿都一併代筆。久而久之，他們習慣了我的大包大攬，變得消極被動，甚至在報告出現瑕疵時，將責任全推卸到我身上。那一次，我的「多做」沒有換來感激，反而換來了身心俱疲。我成了團隊裡的「濫好人」，這讓我深刻反思，毫無底線的付出，只會寵壞他人。

🌟【第四段：合 ─ 提出平衡之道】
💡 寫作思考：綜合正反兩面，提出「界線感」與「大局觀」的重要性，期許在利他與愛己間取得平衡。
🎯 修辭與佳句：對偶（溫柔而堅定地守護自己的界線）、轉化（結出豐碩而甜美的多得之果）。
📝 範文段落：
　　由此可見，「多做」是否能帶來「多得」，關鍵在於我們是否具備「界線感」與「大局觀」。真正的能者多勞，不是盲目地將所有責任攬在身上，而是在自己能力所及的範圍內，發揮最大的價值；同時，也要懂得適時放手，引導團隊成員共同參與。「多做多得」是一門深刻的生命哲學，唯有在利他與愛己之間找到平衡，我們的「多做」，才能真正結出豐碩而甜美的「多得」之果。` 
            },

📝 範文段落：
　　春節的腳步漸近，空氣中開始瀰漫著除舊布新的氣息。在臺灣眾多的傳統習俗中，「過年大掃除」無疑是最令人又愛又恨的一項。每年除夕前夕，家家戶戶總要挽起袖子，將屋內屋外洗刷得一塵不染。在過去，我總視大掃除為一場耗費體力的無謂勞動；然而，隨著年紀漸長，我在這項繁瑣的習俗裡，看見了超越表面清潔的深層情感與文化意涵。

🌟【第二段：承 ─ 探究「除舊布新」的哲理】
💡 寫作思考：將實體的打掃昇華為「心靈大掃除」，探討丟棄舊物象徵放下遺憾，整理空間代表承載未來希望的古人智慧。
🎯 修辭與佳句：暗喻（一場具象化的「心靈大掃除」）。
📝 範文段落：
　　「除舊布新」，字面上的意義是清除過去一年的灰塵，迎接新年的到來。在揮汗如雨地擦拭窗戶、整理雜物時，我逐漸體悟到，這其實是一場具象化的「心靈大掃除」。丟棄那些不再需要的物品，象徵著放下過去的遺憾與失敗；將環境打理得井然有序，則是為了騰出清爽的空間，去承載未來一年的希望與期盼。這種透過外在環境的清理來達成內在心靈淨化的過程，是古人留給我們的生活智慧。

🌟【第三段：轉 ─ 看見「家族凝聚」的溫度】
💡 寫作思考：將視角轉向家人間的分工合作，點出大掃除神奇地將平日疏離的家人栓在一起，具有凝聚情感的社會功能。
🎯 修辭與佳句：映襯（任何昂貴的年夜飯都無法替代的溫馨）。
📝 範文段落：
　　更重要的是，在這樣的傳統習俗裡，我看見了「家族凝聚」的強大力量。在現代社會，家人們平時各自忙碌，鮮少有機會共同完成一件耗時耗力的任務。大掃除卻神奇地將全家人栓在一起。爸爸負責高處風扇，媽媽在廚房刷洗，而我整理客廳。在分工合作中，伴隨著偶爾的抱怨與互相打趣的笑聲，平日裡疏離的感情被重新拉近。那種共同為一個「家」付出的辛勞，是任何昂貴的年夜飯都無法替代的溫馨。

🌟【第四段：合 ─ 結合現代觀念與總結】
💡 寫作思考：提出習俗應與時俱進，結合現代「斷捨離」的極簡概念，總結大掃除是洗滌心靈與情感交織的珍貴時刻。
🎯 修辭與佳句：轉化（讓家與心靈重新煥發光彩）。
📝 範文段落：
　　然而，習俗也需與時俱進。在崇尚極簡生活的現代，我們或許不必再拘泥於形式上將每一寸地板都刷得發亮，更重要的是傳承「除舊布新」與「家人團聚」的核心精神，實踐「斷捨離」，讓生活回歸簡單純粹。在過年大掃除這項傳統習俗裡，我看見了洗滌心靈的哲理，也看見了情感交織的溫度。它不僅是迎接新年的儀式，更是一年一度讓家與心靈重新煥發光彩的珍貴時刻。` 
            },

　　災難發生的隔天，電視螢幕上不斷播送著災區滿目瘡痍的畫面。倒塌的樓房、焦急尋找親人的家屬，以及穿梭在瓦礫堆中的搜救人員，那一幕幕怵目驚心的景象，深深震撼了我的心靈。在巨大的天災面前，個人的力量顯得微不足道。然而，當我看到來自全國各地的物資如雪片般湧入災區，看到無數志工不眠不休地投入救災，我明白了：災難固然可怕，但人類互助合作的愛與韌性，卻足以穿透最深沉的黑暗。

　　這場災難徹底改變了我的人生觀。過去我總將日常視為理所當然，現在我懂得珍惜每一個平凡的早晨，因為那些看似枯燥的日常，其實是許多人求之不得的奢望。身為一名國中生，我們或許無法衝鋒陷陣，但我們絕非只能袖手旁觀。我們可以建立正確的防災觀念保護自己；可以省下零用錢捐給災民；更可以在網路上傳遞正確的資訊，用溫暖的文字撫慰人心，拒絕散播恐慌與謠言。

🌟【第四段：合 ─ 總結災難的啟示】
💡 寫作思考：總結災難是嚴厲的考驗，但只要不放棄互助，微光終能匯聚成炬，在廢墟中播下希望種子。
🎯 修辭與佳句：引用（沒有人是一座孤島）、暗喻（將點滴的微光匯聚成炬）。
📝 範文段落：
　　災難，是大自然給人類的一場嚴厲考驗。它無情地奪走生命與財產，卻也喚醒了我們對生命的敬畏與對彼此的關愛。當災難發生時，沒有人是一座孤島。只要我們願意伸出援手，將點滴的微光匯聚成炬，便能照亮災區的漫漫長夜，在廢墟中重新播下希望的種子。`

　　在房間書桌最底層的抽屜裡，靜靜地躺著一個有些泛黃、邊角磨損的鐵製餅乾盒。它沒有精緻的密碼鎖，也沒有華麗的外觀，但在我心中，它卻是比任何璀璨珠寶都要珍貴的無價之寶。輕輕掀開盒蓋，裡面裝的不是什麼稀世珍品，而是一疊厚薄不一、字跡稚嫩的信件，那是爺爺留給我最溫暖的餽贈。

🎯 修辭與佳句：設問（這世上真的存在絕對的完美嗎？）、暗喻（虛幻的烏托邦）。
📝 範文段落：
　　在追求卓越的道路上，「完美」彷彿是懸掛在天際的璀璨星辰，引誘著無數人窮盡一生去追逐。我們渴望完美無瑕的容貌、毫無破綻的成績、圓滿無缺的人生。然而，這世上真的存在絕對的完美嗎？我認為，絕對的完美只是一個虛幻的烏托邦，而真正動人的美，往往潛藏在那些看似遺憾的「缺陷」之中。

🌟【第二段：承 ─ 引用自然與藝術論證缺陷之美】
💡 寫作思考：以「水滿則溢」的自然法則，與「斷臂維納斯」的藝術經典為例，論證缺陷是一種留白與生命力的展現。
🎯 修辭與佳句：引用（水滿則溢，月盈則虧）、映襯（永不凋零的塑膠花 vs 帶著微黃的真花）。
📝 範文段落：
　　「水滿則溢，月盈則虧」，大自然早已用其運行的法則昭示了不完美的哲理。一朵永不凋零的塑膠花，比不上一朵經歷風吹雨打、花瓣帶著微黃的真花來得有生命力。在藝術的殿堂裡，斷臂的維納斯雕像之所以能成為不朽的經典，正是因為那缺失的雙臂，賦予了觀賞者無限的想像空間。缺陷，並非摧毀美的元凶，反而是一種留白，讓美得以在其中呼吸、延伸。

🌟【第三段：轉 ─ 探討偏執完美的反效果】
💡 寫作思考：舉極具繪畫天賦的同學為例，因為對絕對完美的苛刻要求，反而失去了作畫的快樂與藝術的靈魂，凸顯完美主義的枷鎖。
🎯 修辭與佳句：轉化（成為禁錮心靈的枷鎖、一抹不經意的暈染反而成就獨特的靈魂）。
📝 範文段落：
　　在現實生活中，對「絕對完美」的偏執，往往會成為禁錮心靈的枷鎖。我曾有一位在繪畫上極具天賦的同學，她對作品要求到了苛刻的地步。只要有一絲筆觸不符心意，她便會揉毀重畫。長期的壓力下，她失去了作畫的快樂。她忘記了，藝術的動人之處不在於精準如機器的線條，而在於情感的自然流露。有時，一抹不經意的暈染，一個看似失誤的飛白，反而能成就一幅作品獨特的靈魂。

🌟【第四段：合 ─ 重新定義真正的完美】
💡 寫作思考：引用萊昂納德·科恩的名言，總結真正的完美是懂得接納缺陷的包容，在不完美中依然努力綻放的姿態。
🎯 修辭與佳句：引用（萬物皆有裂痕，那是光照進來的地方）。
📝 範文段落：
　　「萬物皆有裂痕，那是光照進來的地方。」這句名言深刻地詮釋了缺陷的價值。正是因為我們不完美，所以才有渴望成長的動力；正是因為彼此都有缺陷，人類才需要互相包容。真正的完美，不是毫無瑕疵的死寂，而是懂得接納缺陷的包容，是在不完美中依然努力綻放的姿態。當我們學會擁抱自己的缺點，才能卸下包袱，揮灑出屬於自己、雖有裂痕卻無比絢爛的色彩。` 
            },

　　當你拆開這封信時，想必已是高三的鳳凰花開之際，正站在青春的分水嶺上，迎接著大考的洗禮與成年的加冕。現在的我，正處於國三的兵荒馬亂之中，望著窗外湛藍的天空，心中滿是對你——未來的我的好奇與期盼。我寫下這封信，不只是為了留下青春的印記，更是為了與你定下一個關於成長的契約。

🌟【第二段：承 ─ 期許具備獨立思考的能力】
💡 寫作思考：提出第一個期許：「獨立思考」。在多元複雜的高中環境中，不隨波逐流，勇敢發出真實的聲音。
🎯 修辭與佳句：映襯與譬喻（不要成為隨波逐流的浮萍，而是要做一株深扎於泥土的橡樹）。
📝 範文段落：
　　我希望三年後的你，已經長成了一個擁有「獨立思考」能力的人。在高中這個更廣闊、更多元的叢林裡，你一定會遇到許多與以往截然不同的價值觀，甚至面臨人云亦云的盲從誘惑。我期許你不要成為隨波逐流的浮萍，而是要做一株深扎於泥土的橡樹。面對紛雜的資訊與他人的評價，希望你能保有批判的眼光，勇敢地發出屬於自己的聲音，哪怕那聲音微弱，也必須是真實且真誠的。

🌟【第三段：轉 ─ 期許保有一顆強韌且溫柔的心】
💡 寫作思考：提出第二個期許：「強韌且溫柔」。面對課業壓力允許自己脆弱，但要有自癒的韌性，且不忘善待他人與不完美的自己。
🎯 修辭與佳句：排比（跌倒了，就拍拍身上的灰塵站起來；流淚了，擦乾眼淚後繼續前行）。
📝 範文段落：
　　除了智慧的增長，我更在乎你是否擁有一顆「強韌且溫柔」的心。高中的課業壓力必定如排山倒海而來，你可能會在無數個熬夜苦讀的夜晚感到挫折，甚至經歷幾次痛徹心扉的失敗。但我祈求你，千萬不要被挫折擊垮。請記住，跌倒了，就拍拍灰塵站起來；流淚了，擦乾眼淚後繼續前行。請允許自己有脆弱的權利，但也要具備自我療癒的韌性。同時，在追求卓越的路上，請不要遺失了對周遭事物的溫柔，善待他人，也善待那個不完美的自己。

🌟【第四段：合 ─ 立足當下，獻上誠摯祝福】
💡 寫作思考：將眼光拉回現在，說明正為未來鋪路努力。最後以豁達的態度結尾，不論世俗成就如何，只要無愧於心即可。
🎯 修辭與佳句：對偶（眼底有光，心中有愛，無畏風雨，一路向陽）。
📝 範文段落：
　　為了讓你能在三年後綻放出最美的姿態，現在的我必須開始為你鋪路。我正在努力打好學科基礎，培養自律的讀書習慣，因為我知道，沒有今日的汗水，就沒有明日的從容。三年後的你，無論是否考上了理想大學，這都不是最重要的。我只希望，當你回首這三年的來時路，你能無愧於心地說：「我已拚盡全力，我活出了自己最喜歡的模樣。」願你眼底有光，心中有愛，無畏風雨，一路向陽。
　　三年前的你 敬上` 
            }
        ];

        function log(msg) {
            const logArea = document.getElementById('log-area');
            logArea.classList.remove('hidden');
            logArea.innerHTML += `<div class="mb-1">🐾 ${msg}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // 登入初始化
        async function init() {
            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
            app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
            
            // 登入完成後，自動去雲端撈出現有資料來顯示
            fetchCloudQuestions();
        }

        // 把本地陣列上傳到雲端
        window.startMigration = async () => {
            const btn = document.getElementById('migrate-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 努力上傳中，請稍候喔 🏃‍♀️💨...';
            btn.classList.replace('bg-sakura-dark', 'bg-gray-400');
            btn.classList.replace('hover:bg-pink-500', 'hover:bg-gray-500');
            
            try {
                let count = 0;
                for (const q of questionsData) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', COL_QUESTIONS, q.id);
                    await setDoc(docRef, q);
                    count++;
                    log(`✅ 成功同步: ${q.id} - ${q.title} 🌸`);
                }

                log(`🎉 耶！同步大成功！總共更新了 ${count} 題會考模擬題 🎊。`);
                btn.innerHTML = '✅ 題庫同步完成！太棒了 🥳';
                btn.classList.replace('bg-gray-400', 'bg-green-400');
                btn.classList.replace('hover:bg-gray-500', 'hover:bg-green-500');
                
                // 上傳完自動重撈一次列表更新畫面
                setTimeout(() => {
                    fetchCloudQuestions();
                    // 恢復按鈕原本的樣子
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerHTML = '✨ 覆蓋 / 上傳最新 20 題庫至雲端 💖';
                        btn.classList.replace('bg-green-400', 'bg-sakura-dark');
                        btn.classList.replace('hover:bg-green-500', 'hover:bg-pink-500');
                    }, 3000);
                }, 1000);

            } catch (error) {
                console.error(error);
                log(`<span class="text-red-400">❌ 發生錯誤啦: ${error.message} 🥺</span>`);
                btn.innerHTML = '❌ 上傳失敗，請重試 💦';
                btn.classList.replace('bg-gray-400', 'bg-red-400');
                btn.classList.replace('hover:bg-gray-500', 'hover:bg-red-500');
                btn.disabled = false;
            }
        };

        // 從雲端撈資料顯示在表格中
        window.fetchCloudQuestions = async () => {
            document.getElementById('cloud-loading').classList.remove('hidden');
            document.getElementById('table-container').classList.add('hidden');
            document.getElementById('cloud-empty').classList.add('hidden');
            
            try {
                const qRef = collection(db, 'artifacts', appId, 'public', 'data', COL_QUESTIONS);
                const qSnap = await getDocs(qRef);
                
                if (qSnap.empty) {
                    document.getElementById('cloud-loading').classList.add('hidden');
                    document.getElementById('cloud-empty').classList.remove('hidden');
                    return;
                }

                let cloudData = [];
                qSnap.forEach(doc => {
                    cloudData.push({ id: doc.id, ...doc.data() });
                });

                // 排序
                cloudData.sort((a, b) => {
                    const numA = parseInt(a.id.replace('q', '')) || 0;
                    const numB = parseInt(b.id.replace('q', '')) || 0;
                    return numA - numB;
                });

                // 渲染表格
                const tbody = document.getElementById('cloud-questions-list');
                tbody.innerHTML = cloudData.map(q => `
                    <tr class="hover:bg-sakura-light transition-colors">
                        <td class="p-4 border-b-2 border-pink-100 font-mono text-sakura-dark text-center font-bold">${q.id}</td>
                        <td class="p-4 border-b-2 border-pink-100"><span class="bg-sakura-base text-sakura-text text-sm px-3 py-1.5 rounded-lg font-extrabold shadow-sm">${q.type}</span></td>
                        <td class="p-4 border-b-2 border-pink-100 font-bold text-gray-700 text-lg">${q.title}</td>
                        <td class="p-4 border-b-2 border-pink-100 text-center"><span class="text-2xl" title="已成功載入雲端">💖</span></td>
                    </tr>
                `).join('');

                document.getElementById('cloud-loading').classList.add('hidden');
                document.getElementById('table-container').classList.remove('hidden');

            } catch (error) {
                console.error("撈取資料失敗", error);
                document.getElementById('cloud-loading').innerHTML = `<p class="text-red-500 font-bold text-lg"><i class="fas fa-times-circle"></i> 讀取失敗，請確認權限設定喔 😢。</p>`;
            }
        };

        // 啟動程式
        init();

    </script>
